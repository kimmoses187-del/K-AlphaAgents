services:
  - type: web
    name: k-alpha-agents
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 web/app.py
    plan: free

    # ── Persistent disk ($1/month, 1 GB) ─────────────────────────────────────
    # Without this, the reports/ folder is wiped every time the service restarts
    # or redeploys (free tier also spins down after 15 min of inactivity).
    # Uncomment the 3 lines below to keep PDFs and signal JSONs across restarts.
    # NOTE: requires upgrading from the free plan to at least the starter plan.
    #
    # disk:
    #   name: reports-disk
    #   mountPath: /opt/render/project/src/reports
    #   sizeGB: 1

    # ── Environment variables ─────────────────────────────────────────────────
    # Set the secret keys in the Render dashboard (not here).
    # The entries below just declare which env vars the app needs.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      # ── API keys — set values in Render dashboard ─────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false          # marks as secret; must be set manually in dashboard

      - key: OPENAI_API_KEY
        sync: false

      - key: DART_API_KEY
        sync: false

      # ── Optional overrides ────────────────────────────────────────────────
      # Uncomment to use a cheaper model on the hosted instance:
      # - key: CLAUDE_MODEL
      #   value: claude-haiku-4-5

      # Uncomment to run in debug mode (no LLM calls, useful for testing UI):
      # - key: DEBUG_MODE
      #   value: "true"
