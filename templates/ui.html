<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-AlphaAgents · Korean Equity Analysis</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    /* ── Reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2230;
      --border:    #30363d;
      --gold:      #f0b429;
      --gold-dim:  #a07a1a;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --buy:       #3fb950;
      --sell:      #f85149;
      --info:      #58a6ff;
      --warning:   #d29922;
      --radius:    10px;
      --sidebar-w: 260px;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    #shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 24px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    #logo {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #logo .wordmark {
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.02em;
    }

    #logo .tagline {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }

    /* Steps */
    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--muted);
      transition: background 0.2s;
    }

    .step.active {
      background: rgba(240, 180, 41, 0.08);
      color: var(--gold);
    }

    .step.done {
      color: var(--buy);
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    .step.active .step-dot { background: var(--gold); }
    .step.done  .step-dot  { background: var(--buy); }

    /* Stock pool */
    #pool-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pool-pill {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
    }

    .pool-pill .code { color: var(--gold); font-weight: 600; }
    .pool-pill .sig  { font-weight: 700; font-size: 11px; }
    .pool-pill .sig.buy  { color: var(--buy); }
    .pool-pill .sig.sell { color: var(--sell); }

    /* ── Main area ───────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #topbar .title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    #status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
    }

    #status-dot.ready   { background: var(--buy); }
    #status-dot.working { background: var(--gold); animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* Chat scroll */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Progress strip */
    #progress-strip {
      min-height: 28px;
      padding: 6px 20px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--surface);
      transition: opacity 0.3s;
    }

    #progress-strip.hidden { opacity: 0; }

    /* Input bar */
    #inputbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #text-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #text-input:focus { border-color: var(--gold); }
    #text-input:disabled { opacity: 0.4; cursor: not-allowed; }
    #text-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      color: #0d1117;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #ffc93d; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Buttons row */
    #buttons-row {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .opt-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .opt-btn:hover {
      border-color: var(--gold);
      background: rgba(240, 180, 41, 0.07);
      color: var(--gold);
    }

    /* ── Checkbox file picker ────────────────────────────────────── */
    #checkbox-panel {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 10px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow: hidden;
    }

    #checkbox-list {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 210px;
    }

    .cb-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 13px;
      user-select: none;
    }

    .cb-item:hover   { border-color: var(--gold); background: rgba(240,180,41,0.06); }
    .cb-item.selected {
      border-color: var(--gold);
      background: rgba(240,180,41,0.10);
    }

    .cb-box {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      transition: border-color 0.15s, background 0.15s;
    }
    .cb-item.selected .cb-box {
      border-color: var(--gold);
      background: var(--gold);
      color: #0d1117;
    }

    .cb-label { color: var(--text); flex: 1; }
    .cb-meta  { font-size: 11px; color: var(--muted); white-space: nowrap; }

    #checkbox-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #cb-select-all {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
    }
    #cb-select-all:hover { border-color: var(--gold); color: var(--gold); }

    #cb-confirm {
      background: var(--gold);
      border: none;
      border-radius: 7px;
      color: #0d1117;
      font-size: 13px;
      font-weight: 700;
      padding: 7px 18px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #cb-confirm:disabled { opacity: 0.35; cursor: default; }
    #cb-confirm:not(:disabled):hover { opacity: 0.85; }

    /* ── Chat bubbles ─────────────────────────────────────────────── */
    .bubble {
      max-width: 680px;
      width: fit-content;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13.5px;
      line-height: 1.55;
    }

    .bubble.system {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      align-self: flex-start;
    }

    .bubble.user {
      background: rgba(240, 180, 41, 0.10);
      border: 1px solid rgba(240, 180, 41, 0.25);
      color: var(--gold);
      align-self: flex-end;
    }

    .bubble .sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* Message types */
    .bubble.msg-success { border-color: rgba(63, 185, 80, 0.4); }
    .bubble.msg-error   { border-color: rgba(248, 81, 73, 0.4); background: rgba(248,81,73,0.07); }
    .bubble.msg-warning { border-color: rgba(210, 153, 34, 0.4); }
    .bubble.msg-loading { border-color: rgba(88, 166, 255, 0.3); }
    .bubble.msg-info    { }

    .bubble .icon { margin-right: 4px; }

    /* Question bubble */
    .bubble.question {
      border-color: rgba(240, 180, 41, 0.3);
    }

    .bubble.question .q-label {
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* ── Debate card ─────────────────────────────────────────────── */
    /* ── Terminal-style debate grid ─────────────────────────────── */
    .tgrid-wrap {
      font-family: 'Menlo', 'Courier New', monospace;
      font-size: 13px;
      background: #010409;
      border: 1px solid #30363d;
      border-radius: var(--radius);
      padding: 14px 18px;
      max-width: 680px;
      width: 100%;
      line-height: 1.7;
    }

    .tgrid-ticker {
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .tgrid-phdr {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 3px;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
    }
    .tgrid-phdr.averse  { color: var(--gold); }
    .tgrid-phdr.neutral { color: var(--info);  }

    .tgrid-agents { margin-bottom: 6px; }

    .tgrid-row {
      display: flex;
      align-items: center;
      padding: 0 0 0 16px;
    }

    .tgrid-name {
      color: #e6edf3;
      width: 170px;
      flex-shrink: 0;
      font-size: 13px;
    }

    .tgrid-colon {
      color: #8b949e;
      margin-right: 8px;
    }

    .tgrid-status { font-size: 13px; }
    .tgrid-status.dim    { color: #8b949e; }
    .tgrid-status.buy    { color: var(--buy);  font-weight: 700; }
    .tgrid-status.sell   { color: var(--sell); font-weight: 700; }

    .tgrid-sep { height: 6px; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result card */
    .result-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      max-width: 680px;
      width: 100%;
    }

    .result-card .rc-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .result-card .rc-ticker {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
    }

    .result-card .rc-name {
      font-size: 13px;
      color: var(--muted);
    }

    .result-card .rc-rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 6px;
      font-size: 12px;
    }

    .rc-row .profile { color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .rc-row .sig { font-weight: 800; font-size: 14px; }
    .rc-row .sig.buy  { color: var(--buy); }
    .rc-row .sig.sell { color: var(--sell); }
    .rc-row .meta { color: var(--muted); font-size: 11px; display: flex; gap: 12px; }

    /* Done card */
    .done-card {
      background: rgba(63,185,80,0.07);
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: var(--radius);
      padding: 14px 18px;
      max-width: 680px;
    }

    .done-card .dc-title { font-weight: 700; margin-bottom: 4px; color: var(--buy); }
    .done-card .dc-sub   { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

    .dl-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .dl-btn:hover { opacity: 0.8; }

    .dl-btn.pdf {
      background: var(--gold);
      color: #0d1117;
    }

    .dl-btn.json {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>

<div id="shell">

  <!-- ── Sidebar ──────────────────────────────────────────────────── -->
  <aside id="sidebar">

    <div id="logo">
      <div class="wordmark">K-AlphaAgents</div>
      <div class="tagline">Korean Equity · Multi-Agent AI</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Session Steps</div>
      <div id="steps">
        <div class="step" id="step-mode">   <div class="step-dot"></div> Choose Mode</div>
        <div class="step" id="step-date">   <div class="step-dot"></div> Analysis Date</div>
        <div class="step" id="step-stocks"> <div class="step-dot"></div> Add Stocks</div>
        <div class="step" id="step-analyze"><div class="step-dot"></div> Agent Analysis</div>
        <div class="step" id="step-backtest"><div class="step-dot"></div> Backtest</div>
        <div class="step" id="step-report"> <div class="step-dot"></div> PDF Report</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Stock Pool</div>
      <div id="pool-list"><span style="font-size:11px;color:var(--muted)">None yet</span></div>
    </div>

  </aside>

  <!-- ── Main ─────────────────────────────────────────────────────── -->
  <div id="main">

    <div id="topbar">
      <div class="title">Analysis Session</div>
      <div id="status-badge">
        <div id="status-dot"></div>
        <span id="status-text">Connecting…</span>
      </div>
    </div>

    <!-- Chat messages -->
    <div id="chat"></div>

    <!-- Progress strip -->
    <div id="progress-strip" class="hidden"></div>

    <!-- Button options (shown when server sends buttons) -->
    <div id="buttons-row"></div>

    <!-- Checkbox file picker (shown when server sends checkboxes) -->
    <div id="checkbox-panel" style="display:none;">
      <div id="checkbox-list"></div>
      <div id="checkbox-actions">
        <button id="cb-select-all">Select All</button>
        <button id="cb-confirm" disabled>✓ Confirm Selection</button>
      </div>
    </div>

    <!-- Text input bar -->
    <div id="inputbar">
      <input id="text-input" type="text" placeholder="Waiting for connection…" disabled />
      <button id="send-btn" disabled>Send</button>
    </div>

  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const chat       = document.getElementById("chat");
const progress   = document.getElementById("progress-strip");
const btnRow     = document.getElementById("buttons-row");
const cbPanel    = document.getElementById("checkbox-panel");
const cbList     = document.getElementById("checkbox-list");
const cbConfirm  = document.getElementById("cb-confirm");
const cbSelectAll= document.getElementById("cb-select-all");
const textInput  = document.getElementById("text-input");
const sendBtn    = document.getElementById("send-btn");
const statusDot  = document.getElementById("status-dot");
const statusText = document.getElementById("status-text");
const poolList   = document.getElementById("pool-list");

let waitingForInput = false;  // true while server is blocking on ask()
let inputType       = "text"; // "text" | "buttons" | "checkboxes"

// pool: {code: {name, signal_averse, signal_neutral}}
const stockPool = {};

// track signal JSON paths per ticker for download
const signalFiles = {};

// Terminal-grid debate state
// tgridState[ticker][profile] = { hdr: <el>, agents: { AgentName: statusEl } }
const tgridState    = {};
let   currentTicker = null;

// ── Socket ─────────────────────────────────────────────────────────────────
const socket = io({ transports: ["websocket"] });

socket.on("connect", () => {
  statusDot.className  = "ready";
  statusText.textContent = "Connected";
  // auto-start the pipeline
  socket.emit("c_start");
});

socket.on("disconnect", () => {
  statusDot.className    = "";
  statusText.textContent = "Disconnected";
  setInputMode("idle");
});

// ── Server events ──────────────────────────────────────────────────────────

socket.on("s_ready", () => {
  // nothing needed — c_start already sent on connect
});

socket.on("s_message", (d) => {
  appendMessage(d.text, d.msg_type || "info", d.subtext || "");
  scrollBottom();
});

socket.on("s_question", (d) => {
  appendQuestion(d.text, d.subtext || "");
  inputType = d.input_type || "text";

  if (inputType === "buttons") {
    showButtons(d.options || []);
    setInputMode("buttons");
  } else if (inputType === "checkboxes") {
    showCheckboxes(d.options || []);
    setInputMode("checkboxes");
  } else {
    setInputMode("text", d.text);
  }

  waitingForInput = true;
  scrollBottom();
  // advance sidebar step based on question
  inferStep(d.text);
});

socket.on("s_progress", (d) => {
  progress.textContent = "⟳ " + d.text;
  progress.classList.remove("hidden");
});

socket.on("s_debate_start", (d) => {
  setStep("step-analyze");
  appendDebateCards(d.ticker, d.name);
  scrollBottom();
});

socket.on("s_agent_update", (d) => {
  updateAgentCard(d.agent, d.status, d.signal, d.round, d.profile || "");
});

socket.on("s_stock_result", (d) => {
  progress.classList.add("hidden");
  appendStockResult(d.ticker, d.name, d.results);
  addToPool(d.ticker, d.name, d.results);
  // store signal file path if provided
  if (d.signal_file) signalFiles[d.ticker] = d.signal_file;
  scrollBottom();
});

socket.on("s_done", (d) => {
  setStep("step-report");
  statusDot.className    = "";
  statusText.textContent = "Session complete";
  if (d.pdf_path) {
    appendDone(d.pdf_path);
  }
  setInputMode("idle");
  progress.classList.add("hidden");
  scrollBottom();
});

// ── Input handling ─────────────────────────────────────────────────────────

function sendValue(value) {
  if (!waitingForInput) return;
  waitingForInput = false;
  socket.emit("c_input", { value });

  // Show what the user typed/selected
  appendUserBubble(value);

  // Reset UI
  hideButtons();
  hideCheckboxes();
  setInputMode("idle");
  textInput.value = "";
  statusDot.className    = "working";
  statusText.textContent = "Analyzing…";
  scrollBottom();
}

sendBtn.addEventListener("click", () => {
  const v = textInput.value.trim();
  if (v) sendValue(v);
});

textInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const v = textInput.value.trim();
    if (v) sendValue(v);
  }
});

// ── UI helpers ─────────────────────────────────────────────────────────────

function setInputMode(mode, placeholder = "") {
  // hide everything first
  hideButtons();
  hideCheckboxes();
  if (mode === "text") {
    textInput.disabled    = false;
    textInput.placeholder = placeholder || "Type your answer…";
    sendBtn.disabled      = false;
    textInput.focus();
  } else if (mode === "buttons") {
    textInput.disabled    = true;
    textInput.placeholder = "Click an option above…";
    sendBtn.disabled      = true;
  } else if (mode === "checkboxes") {
    textInput.disabled    = true;
    textInput.placeholder = "Select files above, then click Confirm…";
    sendBtn.disabled      = true;
    // cbPanel shown by showCheckboxes() — don't double-show here
  } else {
    // idle
    textInput.disabled    = true;
    textInput.placeholder = "";
    sendBtn.disabled      = true;
  }
}

function showButtons(options) {
  btnRow.innerHTML = "";
  btnRow.style.display = "flex";
  options.forEach((opt) => {
    const btn = document.createElement("button");
    btn.className   = "opt-btn";
    btn.textContent = opt.label;
    btn.onclick     = () => sendValue(opt.value);
    btnRow.appendChild(btn);
  });
}

function hideButtons() {
  btnRow.style.display = "none";
  btnRow.innerHTML = "";
}

function showCheckboxes(options) {
  cbList.innerHTML = "";
  const selected = new Set();

  function updateConfirm() {
    cbConfirm.disabled = selected.size === 0;
    cbSelectAll.textContent = selected.size === options.length ? "Deselect All" : "Select All";
  }

  options.forEach((opt) => {
    const item = document.createElement("div");
    item.className = "cb-item";

    // Parse label: "CODE · Name · Date" → show code+name on left, date on right
    const parts = opt.label.split(" · ");
    const main  = parts.slice(0, 2).join(" · ");
    const meta  = parts[2] || "";

    item.innerHTML = `
      <div class="cb-box"></div>
      <span class="cb-label">${escHtml(main)}</span>
      <span class="cb-meta">${escHtml(meta)}</span>
    `;

    item.addEventListener("click", () => {
      if (selected.has(opt.value)) {
        selected.delete(opt.value);
        item.classList.remove("selected");
        item.querySelector(".cb-box").textContent = "";
      } else {
        selected.add(opt.value);
        item.classList.add("selected");
        item.querySelector(".cb-box").textContent = "✓";
      }
      updateConfirm();
    });

    cbList.appendChild(item);
  });

  cbSelectAll.onclick = () => {
    const allSelected = selected.size === options.length;
    cbList.querySelectorAll(".cb-item").forEach((item, i) => {
      const val = options[i].value;
      if (allSelected) {
        selected.delete(val);
        item.classList.remove("selected");
        item.querySelector(".cb-box").textContent = "";
      } else {
        selected.add(val);
        item.classList.add("selected");
        item.querySelector(".cb-box").textContent = "✓";
      }
    });
    updateConfirm();
  };

  cbConfirm.disabled = true;
  cbConfirm.onclick = () => {
    if (selected.size === 0) return;
    const val = [...selected].join(",");
    hideCheckboxes();
    sendValue(val);
  };

  cbPanel.style.display = "flex";
  updateConfirm();
}

function hideCheckboxes() {
  cbPanel.style.display = "none";
  cbList.innerHTML = "";
}

function scrollBottom() {
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

// ── Bubble builders ────────────────────────────────────────────────────────

  const icons = { success:"✅", error:"❌", warning:"⚠️", loading:"🔍", info:"ℹ️" };

function appendQuestion(text, subtext) {

  el.innerHTML = `<div class="q-label">💬 ${escHtml(text)}</div>` +
    (subtext ? `<div class="sub">${escHtml(subtext)}</div>` : "");

}

function appendUserBubble(text) {

const AGENT_SHORT = {
  FundamentalAgent: "FUND.",
  SentimentAgent:   "SENT.",
  TechnicalAgent:   "TECH.",
  MarketAgent:      "MARKET",
  MacroAgent:       "MACRO",
};
const AGENTS = Object.keys(AGENT_SHORT);

const _SEP  = "─".repeat(36);
const _PROFILES_DEF = [
  { key: "risk-averse",  cls: "averse",  label: "RISK-AVERSE"  },
  { key: "risk-neutral", cls: "neutral", label: "RISK-NEUTRAL" },
];

function _hdrText(label, round) {
  const phase = round === 0 ? "Independent analysis" : "Debate";
  return `── ${label}  Round ${round} — ${phase} ${_SEP}`;
}

function _profileDef(key) {
  return _PROFILES_DEF.find((p) => p.key === key)
         || { key, cls: "", label: key.toUpperCase() };
}

// Build one profile column on first use, so a single-profile run shows a single
// column (no empty "analyzing…" placeholder for an unselected profile).
function _ensureProfileSection(ticker, profile) {
  const state = tgridState[ticker];
  if (!state) return null;
  if (state[profile]) return state[profile];

  const p    = _profileDef(profile);
  const wrap = state.__wrap;

  if (state.__hasSection) {
    const sep = document.createElement("div");
    sep.className = "tgrid-sep";
    wrap.appendChild(sep);
  }
  state.__hasSection = true;

  const hdr = document.createElement("div");
  hdr.className = `tgrid-phdr ${p.cls}`;
  hdr.textContent = _hdrText(p.label, 0);
  wrap.appendChild(hdr);

  const agentsDiv = document.createElement("div");
  agentsDiv.className = "tgrid-agents";

  // Agent rows are added lazily as each agent reports, so a 1/3-agent run shows
  // only the agents that actually debated (see _ensureAgentRow).
  wrap.appendChild(agentsDiv);
  state[profile] = { hdr, agentsDiv, agents: {} };
  return state[profile];
}

// Build one agent row on first use within a profile section.
function _ensureAgentRow(section, agent) {
  if (section.agents[agent]) return section.agents[agent];

  const row = document.createElement("div");
  row.className = "tgrid-row";

  const nameEl = document.createElement("span");
  nameEl.className = "tgrid-name";
  nameEl.textContent = agent;

  const colonEl = document.createElement("span");
  colonEl.className = "tgrid-colon";
  colonEl.textContent = ":";

  const statusEl = document.createElement("span");
  statusEl.className = "tgrid-status dim";
  statusEl.innerHTML = `<span class="spinner"></span> analyzing…`;

  row.appendChild(nameEl);
  row.appendChild(colonEl);
  row.appendChild(statusEl);
  section.agentsDiv.appendChild(row);
  section.agents[agent] = statusEl;
  return statusEl;
}

function appendDebateCards(ticker, name) {
  currentTicker = ticker;

  const wrap = document.createElement("div");
  wrap.className = "tgrid-wrap";

  const tickerEl = document.createElement("div");
  tickerEl.className = "tgrid-ticker";
  tickerEl.textContent = `${ticker} · ${name} · Agent Debate`;
  wrap.appendChild(tickerEl);

  // Columns are created lazily as each profile reports (see _ensureProfileSection).
  tgridState[ticker] = { __wrap: wrap, __hasSection: false };

  chat.appendChild(wrap);
}

function updateAgentCard(agent, status, signal, round, profile) {
  const ticker = currentTicker;
  if (!ticker || !profile) return;

  const section = _ensureProfileSection(ticker, profile);
  if (!section) return;

  // Update header for the current round
  const label = _profileDef(profile).label;
  section.hdr.textContent = _hdrText(label, round);

  const statusEl = _ensureAgentRow(section, agent);
  if (!statusEl) return;

  const s = (signal || "").toUpperCase();
  if (status === "analyzing") {
    statusEl.className = "tgrid-status dim";
    statusEl.innerHTML = `<span class="spinner"></span> analyzing…`;
  } else if (status === "done" || status === "round") {
    if (s === "BUY") {
      statusEl.className = "tgrid-status buy";
      statusEl.textContent = "✓ BUY";
    } else if (s === "SELL") {
      statusEl.className = "tgrid-status sell";
      statusEl.textContent = "✗ SELL";
    }
  }
}

function appendStockResult(ticker, name, results) {
  const card = document.createElement("div");
  card.className = "result-card";
  card.innerHTML = `<div class="rc-header">
    <span class="rc-ticker">${escHtml(ticker)}</span>
    <span class="rc-name">${escHtml(name)} · Final Signals</span>
  </div>
  <div class="rc-rows" id="rcrows-${ticker}"></div>`;
  chat.appendChild(card);

  const rows = card.querySelector(`#rcrows-${ticker}`);
  results.forEach((r) => {
    const s = (r.signal || "").toUpperCase();
    const row = document.createElement("div");
    row.className = "rc-row";
    row.innerHTML = `
      <span class="profile">${escHtml(r.profile)}</span>
      <span class="sig ${s === "BUY" ? "buy" : "sell"}">${s}</span>
      <span class="meta">
        <span>convergence ${r.conviction}</span>
        <span>${r.consensus} · ${r.rounds} round(s)</span>
      </span>`;
    rows.appendChild(row);
  });
}

function appendDone(pdfPath) {
  const el = document.createElement("div");
  el.className = "done-card";

  // Build download buttons
  let btns = `<div class="dl-buttons">`;

  if (pdfPath) {
    btns += `<a class="dl-btn pdf" href="/download?file=${encodeURIComponent(pdfPath)}" download>
      ⬇ Download PDF Report
    </a>`;
  }

  // One JSON button per analyzed stock
  Object.entries(signalFiles).forEach(([ticker, path]) => {
    btns += `<a class="dl-btn json" href="/download?file=${encodeURIComponent(path)}" download>
      ⬇ ${escHtml(ticker)} signals.json
    </a>`;
  });

  btns += `</div>`;

  el.innerHTML = `
    <div class="dc-title">✅ Analysis complete</div>
    <div class="dc-sub">Download your files below — available until the server restarts.</div>
    ${btns}
  `;
  chat.appendChild(el);
}

function addToPool(ticker, name, results) {
  // Use risk-averse signal as primary
  const ra = results.find(r => r.profile === "risk-averse") || results[0];
  stockPool[ticker] = { name, signal: ra ? ra.signal : "?" };
  renderPool();
}

function renderPool() {
  if (!Object.keys(stockPool).length) return;
  poolList.innerHTML = "";
  Object.entries(stockPool).forEach(([code, info]) => {
    const pill = document.createElement("div");
    pill.className = "pool-pill";
    const s = (info.signal || "").toUpperCase();
    pill.innerHTML = `<span class="code">${escHtml(code)}</span>
      <span class="sig ${s === "BUY" ? "buy" : "sell"}">${s}</span>`;
    poolList.appendChild(pill);
  });
}

// ── Step tracker ───────────────────────────────────────────────────────────

let currentStep = null;

const STEP_MAP = [
  ["step-mode",    ["proceed","How would you like"]],
  ["step-date",    ["analysis date","date"]],
  ["step-stocks",  ["ticker","stock #","stock code"]],
  ["step-analyze", ["debate","agent","analyzing"]],
  ["step-backtest",["backtest","end date"]],
  ["step-report",  ["pdf","report","complete"]],
];

function inferStep(text) {
  const t = text.toLowerCase();
  for (const [id, keywords] of STEP_MAP) {
    if (keywords.some(k => t.includes(k))) {
      setStep(id);
      return;
    }
  }
}

function setStep(id) {
  if (currentStep === id) return;
  // mark previous as done
  if (currentStep) {
    const prev = document.getElementById(currentStep);
    if (prev) { prev.className = "step done"; }
  }
  currentStep = id;
  const el = document.getElementById(id);
  if (el) el.className = "step active";
}

// ── Utility ────────────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// initial step
setStep("step-mode");
